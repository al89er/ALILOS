name: Deploy ALILOS Webapp to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "webapp/**"
      - ".github/workflows/deploy-webapp.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare webapp artifact
        run: |
          rm -rf dist-webapp
          mkdir -p dist-webapp
          cp -R webapp/. dist-webapp/

      - name: Add GitHub Pages config
        env:
          ALILOS_SUPABASE_URL: ${{ vars.ALILOS_SUPABASE_URL }}
          ALILOS_SUPABASE_ANON_KEY: ${{ vars.ALILOS_SUPABASE_ANON_KEY }}
          ALILOS_DEVICE_ID: ${{ vars.ALILOS_DEVICE_ID }}
        run: |
          node -e 'const fs = require("fs"); const config = { supabaseUrl: process.env.ALILOS_SUPABASE_URL || "", supabaseAnonKey: process.env.ALILOS_SUPABASE_ANON_KEY || "", deviceId: process.env.ALILOS_DEVICE_ID || "" }; fs.writeFileSync("dist-webapp/config.js", `window.ALILOS_CONFIG = ${JSON.stringify(config, null, 2)};\n`);'

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload webapp artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-webapp

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
